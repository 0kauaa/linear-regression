name:                linear-regression
version:             0.1.0.0
github:              "0kauaa/linear-regression"
license:             MIT
author:              "Kauã Santana"
maintainer:          "kauassilva0023@gmail.com"
copyright:           "2026 Kauã Santana"

dependencies:
- base >= 4.7 && < 5

ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-export-lists
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

library:
  source-dirs: src
  exposed-modules:
    - Dataset
    - LinearRegressor

executables:
  linear-regression:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - linear-regression